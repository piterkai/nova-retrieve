version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: nova-retrieve-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO

volumes:
  qdrant_storage:
